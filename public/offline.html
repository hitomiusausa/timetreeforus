<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6BE6D7" />
    <title>オフライン | TimeTree For Us</title>
    <style>
      :root {
        color: #1f2d2b;
        background: #f3fffc;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 360px;
        border: 1px solid rgba(107, 230, 215, 0.6);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 40px rgba(31, 45, 43, 0.12);
        padding: 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
      }

      p {
        margin: 0;
        color: #536764;
        font-weight: 700;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>オフラインです</h1>
      <p>予定の表示や編集には通信が必要です。接続を確認してから、もう一度開いてください。</p>
    </main>
  </body>
</html>
